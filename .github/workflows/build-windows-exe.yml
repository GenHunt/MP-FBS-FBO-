name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build EXE on Windows
    runs-on: windows-latest

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 2. Python setup
      # -----------------------------------------------------------------------
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # -----------------------------------------------------------------------
      # 3. Cache pip
      # -----------------------------------------------------------------------
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # -----------------------------------------------------------------------
      # 4. Install dependencies
      # -----------------------------------------------------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pywin32

      # -----------------------------------------------------------------------
      # 5. Checks (syntax + headless + tests)
      # -----------------------------------------------------------------------
      - name: Check syntax (compileall)
        run: python -m compileall app run.py -q

      - name: Headless smoke test
        run: python run.py --no-gui

      - name: Run tests
        run: pytest tests/ -q

      # -----------------------------------------------------------------------
      # 6. Build EXE
      # -----------------------------------------------------------------------
      - name: Build with PyInstaller
        run: pyinstaller --noconfirm --clean OzonFbsLabelPrinter.spec

      # -----------------------------------------------------------------------
      # 7. Pack dist folder into zip
      # -----------------------------------------------------------------------
      - name: Pack dist into zip
        run: |
          Compress-Archive -Path dist\OzonFbsLabelPrinter -DestinationPath OzonFbsLabelPrinter-windows.zip
        shell: pwsh

      # -----------------------------------------------------------------------
      # 8. Upload artifact (always, on every push/dispatch)
      # -----------------------------------------------------------------------
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OzonFbsLabelPrinter-windows
          path: OzonFbsLabelPrinter-windows.zip
          retention-days: 30

      # -----------------------------------------------------------------------
      # 9. Create GitHub Release (only on v* tags)
      # -----------------------------------------------------------------------
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: OzonFbsLabelPrinter-windows.zip
          generate_release_notes: true
